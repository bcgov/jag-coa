spring:
  application:
    name: coa-large-file-service
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1
      file-size-threshold: 0
bcgov:
  sftp:
    host: ${SFTP_HOST:localhost}
    port: ${SFTP_PORT:22}
    username: ${SFTP_USERNAME:foo}
    password: ${SFTP_PASSWORD:pass}
    remoteLocation: ${SFTP_REMOTELOCATION:upload}
    knownHostsFileName: ${SFTP_KNOWNHOSTS:}
    allowUnknownKeys: ${SFTP_ALLOWUNKNOWN:false}
    sshPrivateKey: ${SFTP_PRIVATE_KEY:}
coa:
  username: ${COA_USERNAME:test}
  password: ${COA_PASSWORD:test}
  applicationName: ${COA_APPLICATION:COA}
  authority: ${COA_AUTHORITY:COA_ROLE}
ords:
  baserUrl: ${ORDS_BASEURL:http://localhost}
  username: ${ORDS_USERNAME:test}
  password: ${ORDS_PASSWORD:test}
obj:
  password: ${OBJ_STORE_PSW:test}
  appId: ${OBJ_STORE_APP_ID:test}
  dbId: ${OBJ_STORE_DB_ID:test}
  username: ${OBJ_STORE_USER:test}
  version: ${OBJ_STORE_VERSION:test}
  ticketLifetime: ${OBJ_STORE_TICKET_LIFETIME:60000}
splunk:
  url: ${SPLUNK_URL:http://localhost/}
  token: ${SPLUNK_TOKEN:garbage}

