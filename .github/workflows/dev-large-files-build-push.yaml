name: Main - Build Dev Image and Push to Artifactory
permissions:
  contents: write

# Controls when the workflow will run
on:
  push:
    branches: [main]
  workflow_dispatch: 
    inputs: 
      tag: 
        description: "Branch to checkout"
        required: true
        default: "main"

env:
  IMAGE_NAME: jag-coa-large-files
  WORKING_DIRECTORY: src/coa-application
  ENV_TAG: dev
  BRANCH_NAME: develop

jobs:
  build-push-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code at the chosen tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref_name }}

      - name: Login to Artifactory
        uses: docker/login-action@v1
        with:
          registry: artifacts.developer.gov.bc.ca
          username: ${{ secrets.ARTIFACTORY_USERNAME }}
          password: ${{ secrets.ARTIFACTORY_PASSWORD }}
      
      # Get SHORT_SHA to tag images
      - name: Get short SHA
        id: short_sha
        run: |
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "Short SHA: $SHORT_SHA"

      - name: Build Image
        working-directory: ${{env.WORKING_DIRECTORY}}
        run: |
          docker build -t artifacts.developer.gov.bc.ca/jbf8-jag-coa/${{env.IMAGE_NAME}}:${{env.ENV_TAG}} .
      
      - name: Docker Push to Artifactory
        run: |
          docker push artifacts.developer.gov.bc.ca/jbf8-jag-coa/${{env.IMAGE_NAME}}:${{env.ENV_TAG}}

      #   Run Vulnerability Scan usinig Trivy scanner
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: artifacts.developer.gov.bc.ca/jbf8-jag-coa/${{ env.IMAGE_NAME }}:${{env.ENV_TAG}}
          format: 'table'
          ignore-unfixed: true
          limit-severities-for-sarif: true
          severity: HIGH,CRITICAL

      - name: Set GitOps SSH Key
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.COA_SSH_KEY }}

      - name: Update Helm Values and Commit
        id: helm
        run: |
          
          # Commit and push the changes
          git config --global user.email "actions@github.com"
          git config --global user.name "COA Large Files GitHub Actions"
          git clone -b ${{ env.BRANCH_NAME }} --single-branch git@github.com:bcgov-c/tenant-gitops-bf8ee6.git
          
          # Navigate to the directory containing your Helm values file for the environment develop -> DEV, test -> test
          cd tenant-gitops-bf8ee6/charts

          # Update the Helm values file with the new image tag and version
          DATETIME=$(date +'%Y-%m-%d %H:%M:%S')  # Get current date and time

          sed -i "s/clftag: .*/clftag: ${{ env.ENV_TAG }} # Image Updated on $DATETIME/" ../deploy/${{ env.ENV_TAG }}_values.yaml
          sed -i "s/clfversion: .*/clfversion: ${{ steps.short_sha.outputs.SHORT_SHA }} # Version Updated on $DATETIME/" ../deploy/${{ env.ENV_TAG }}_values.yaml
          
          git add .
          
          git add ../deploy/${{ env.ENV_TAG }}_values.yaml
          
          # Repackage Helm Chart      

          cd coa-gitops

          helm dependency build
          
          cd charts

          git add .
          
          git commit -m "Update COA Large Files image tag"
          git push origin ${{ env.BRANCH_NAME }} # Update the branch name as needed
