name: Main - Action for PROD Deployment
permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      application:
        required: true
        description: What application do you want to backup?
        type: choice
        options:
          - jag-coa
          - jag-coa-large-files

env:
  IMAGE_NAME: ${{ github.event.inputs.application }}
  WORKING_DIRECTORY: .
  ENV_TAG: prod
  BRANCH_NAME: main

jobs:
  push-image:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set prefix for Image
        run: |
          if [[ ${{ github.event.inputs.application }} == 'jag-coa' ]]; then
              echo "PREFIX=coa" >> "$GITHUB_ENV"
          fi

          if [[ ${{ github.event.inputs.application }} == 'jag-coa-large-files' ]]; then
              echo "PREFIX=clf" >> "$GITHUB_ENV"
          fi

      - name: Login to Artifactory
        uses: docker/login-action@v1
        with:
          registry: artifacts.developer.gov.bc.ca
          username: ${{ secrets.ARTIFACTORY_USERNAME }}
          password: ${{ secrets.ARTIFACTORY_PASSWORD }}
      
      # Get SHORT_SHA for the version
      - name: Get short SHA
        id: short_sha
        run: |
          echo "::set-output name=SHORT_SHA::$(git rev-parse --short HEAD)"
          echo "Short SHA: $SHORT_SHA"
      
      # Prints vital release paramters used
      - name: Print Release Variables
        run: |
          echo "Release Application: ${{env.IMAGE_NAME}}"
          echo "Release Environment: ${{env.ENV_TAG}}"
          echo "Release Git Sha: ${{ steps.short_sha.outputs.SHORT_SHA }}"

      #- name: Backup Image
      #  working-directory: ${{env.WORKING_DIRECTORY}}
      #  run: |
      #    docker pull artifacts.developer.gov.bc.ca/jbf8-jag-coa/${{env.IMAGE_NAME}}:prod
      #    docker tag artifacts.developer.gov.bc.ca/jbf8-jag-coa/${{env.IMAGE_NAME}}:prod artifacts.developer.gov.bc.ca/jbf8-jag-coa/${{env.IMAGE_NAME}}:prod-backup
      #    docker push artifacts.developer.gov.bc.ca/jbf8-jag-coa/${{env.IMAGE_NAME}}:prod-backup

      - name: Pull and Retag Image
        working-directory: ${{env.WORKING_DIRECTORY}}
        run: |
          docker pull artifacts.developer.gov.bc.ca/jbf8-jag-coa/${{env.IMAGE_NAME}}:test
          docker tag artifacts.developer.gov.bc.ca/jbf8-jag-coa/${{env.IMAGE_NAME}}:test artifacts.developer.gov.bc.ca/jbf8-jag-coa/${{env.IMAGE_NAME}}:${{env.ENV_TAG}}

      - name: Docker Push to Artifactory
        run: |
          docker push artifacts.developer.gov.bc.ca/jbf8-jag-coa/${{env.IMAGE_NAME}}:${{env.ENV_TAG}}

      - name: Set GitOps SSH Key
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.AC_SSH_KEY }}

      - name: Update Helm Values and Commit
        id: helm
        run: |

          # Commit and push the changes
          git config --global user.email "actions@github.com"
          git config --global user.name "COA GitHub Actions"
          git clone -b ${{ env.BRANCH_NAME }} --single-branch git@github.com:bcgov-c/tenant-gitops-bf8ee6.git
          
          # Navigate to the directory containing your Helm values file for the environment develop -> DEV, test -> test
          cd tenant-gitops-bf8ee6/charts

          # Update the Helm values file with the new image tag and version
          DATETIME=$(date +'%Y-%m-%d %H:%M:%S')  # Get current date and time

          sed -i "s/${{env.PREFIX}}tag: .*/${{env.PREFIX}}tag: ${{ env.ENV_TAG }} # Image Updated on $DATETIME/" ../deploy/${{ env.ENV_TAG }}_values.yaml
          sed -i "s/${{env.PREFIX}}version: .*/${{env.PREFIX}}version: ${{ steps.short_sha.outputs.SHORT_SHA }} # Version Updated on $DATETIME/" ../deploy/${{ env.ENV_TAG }}_values.yaml
          
          git add .
          
          git add ../deploy/${{ env.ENV_TAG }}_values.yaml
          
          # Repackage Helm Chart      

          cd coa-gitops

          helm dependency build
          
          cd charts

          git add .
          
          git commit -m "Update ${{ env.BRANCH_NAME }} image tag"
          git push origin ${{ env.BRANCH_NAME }} # Update the branch name as needed